# configs/large_scale.yaml
# =============================================================================
# SAMM-Anon 大规模数据集配置 (Segment 方案)
# =============================================================================
# 用途: 从小规模(43说话人)切换到大规模数据集
# 流程: run_offline step1 → segment step1-5 → 去匿名生成
# =============================================================================

# -----------------------------------------------------------------------------
# 路径配置
# -----------------------------------------------------------------------------
paths:
  # 大规模数据集路径
  librispeech_root: "/root/autodl-tmp/datasets/LibriSpeech"

  # 预训练模型
  wavlm_checkpoint: "./checkpoints/WavLM-Large.pt"
  ecapa_checkpoint: "speechbrain/spkrec-ecapa-voxceleb"

  # 缓存与输出 - 大规模数据集专用目录
  cache_dir: "./cache/large"
  checkpoints_dir: "./checkpoints/large"
  output_dir: "./outputs/large"
  log_dir: "./logs/large"

# -----------------------------------------------------------------------------
# WavLM 配置
# -----------------------------------------------------------------------------
ssl:
  model: "wavlm-large"
  layer: 15
  hidden_dim: 1024
  hop_size: 320
  sample_rate: 16000

# -----------------------------------------------------------------------------
# Eta-WavLM 配置
# -----------------------------------------------------------------------------
eta_wavlm:
  speaker_encoder: "speechbrain/spkrec-ecapa-voxceleb"
  speaker_dim: 192
  pca_dim: 128
  projection_type: "linear"
  regularization: 1.0e-6

# -----------------------------------------------------------------------------
# Phone Predictor 配置
# -----------------------------------------------------------------------------
phone_predictor:
  num_phones: 41
  hidden_dim: 256
  num_layers: 2
  checkpoint: "./checkpoints/phone_decoder.pt"

# -----------------------------------------------------------------------------
# Segment Style Extractor 配置
# -----------------------------------------------------------------------------
style_extractor:
  segment_type: "phone"
  min_segment_frames: 3
  raw_dim: 4096
  pca_dim: 64
  features:
    - "mean"
    - "std"
    - "delta_abs_mean"
    - "delta_std"

# -----------------------------------------------------------------------------
# Offline 训练配置 - 大规模数据集
# -----------------------------------------------------------------------------
offline:
  # 使用大规模数据集
  train_split: "train-clean-360"  # 或 "train-other-500"
  test_split: "test-clean"

  # Step 1: 特征提取 (run_offline)
  feature_extraction:
    max_utterances: null  # 使用全部数据
    batch_size: 8
    num_workers: 4
    max_audio_length: 480000  # 最大30秒音频 (16000*30)

  # Step 2: Eta 投影训练
  eta_training:
    max_frames: null
    learning_rate: 0.001
    num_epochs: 10

  # Step 3: Phone Predictor 训练
  phone_training:
    max_utterances: null  # 使用全部数据
    batch_size: 32
    learning_rate: 0.001
    num_epochs: 20

  # Step 4: Style Extractor 训练
  style_training:
    max_frames: null
    max_segments: null

  # Step 5: 预计算话语风格
  style_precompute:
    batch_size: 100

# -----------------------------------------------------------------------------
# Step 6: 风格引导检索配置
# -----------------------------------------------------------------------------
retrieval:
  system: "B"
  use_phone_constraint: true
  use_gender_constraint: true
  use_speaker_constraint: true
  top_k: 1
  similarity_metric: "cosine"
  style_weight: 1.0

# -----------------------------------------------------------------------------
# 计算资源配置
# -----------------------------------------------------------------------------
device: "cuda"
gpu_ids: [0]
num_workers: 4
pin_memory: true

# -----------------------------------------------------------------------------
# 日志配置
# -----------------------------------------------------------------------------
logging:
  level: "INFO"
  save_to_file: true
  log_interval: 100
