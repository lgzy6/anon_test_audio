# configs/base.yaml
# =============================================================================
# SAMM-Anon 基础配置文件 (Segment 方案)
# =============================================================================
# 适用于: Eta-WavLM + Segment Style Extractor 架构
# 训练流程: Step 1-5 (特征提取 → 风格预计算)
# 测试流程: Step 6 (风格引导检索)
#
# 维度变化说明:
#   Step 1: ECAPA-TDNN (192维) → PCA → 128维 speaker embedding
#   Step 2: η = s(1024维) - (d_128 @ A_star + b_star) → η(1024维)
#   Step 4: segment stats (4096维) → PCA → 64维 style vector
#   Step 5: utterance style = avg(segment styles) → 64维
#   Step 6: 使用 64维 style vector 进行检索
# =============================================================================

# -----------------------------------------------------------------------------
# 路径配置
# -----------------------------------------------------------------------------
paths:
  # 数据集
  librispeech_root: "/root/autodl-tmp/datasets/LibriSpeech"

  # 预训练模型
  wavlm_checkpoint: "./checkpoints/WavLM-Large.pt"
  ecapa_checkpoint: "speechbrain/spkrec-ecapa-voxceleb"

  # 缓存与输出
  cache_dir: "./cache"
  checkpoints_dir: "./checkpoints"
  output_dir: "./outputs"
  log_dir: "./logs"

# -----------------------------------------------------------------------------
# WavLM 配置
# -----------------------------------------------------------------------------
ssl:
  model: "wavlm-large"
  layer: 15                    # Layer 15 平衡隐私与效用
  hidden_dim: 1024
  hop_size: 320
  sample_rate: 16000

# -----------------------------------------------------------------------------
# Eta-WavLM 配置
# -----------------------------------------------------------------------------
eta_wavlm:
  # Speaker embedding
  speaker_encoder: "speechbrain/spkrec-ecapa-voxceleb"
  speaker_dim: 192             # ECAPA-TDNN 原始输出维度
  pca_dim: 128                 # PCA 降维目标 (用于 Eta 投影)

  # Eta 投影
  projection_type: "linear"    # 线性投影 A*d + b
  regularization: 1.0e-6       # 正则化系数
  # A_star: (128, 1024), b_star: (1024,)
  # η = s - (d_128 @ A_star + b_star)

# -----------------------------------------------------------------------------
# Phone Predictor 配置
# -----------------------------------------------------------------------------
phone_predictor:
  num_phones: 41               # 音素数量
  hidden_dim: 256
  num_layers: 2
  checkpoint: "./checkpoints/phone_decoder.pt"

# -----------------------------------------------------------------------------
# Segment Style Extractor 配置
# -----------------------------------------------------------------------------
style_extractor:
  segment_type: "phone"        # phone-based segmentation
  min_segment_frames: 3        # 最小段长度

  # 原始特征维度
  raw_dim: 4096                # 4 × 1024 = [mean, std, delta_mean, delta_std]

  # PCA 降维
  pca_dim: 64                  # 风格向量维度 (segment/utterance level)

  # 段级特征
  features:
    - "mean"                   # mean(η)
    - "std"                    # std(η)
    - "delta_abs_mean"         # mean(|Δη|)
    - "delta_std"              # std(Δη)

# -----------------------------------------------------------------------------
# Offline 训练配置
# -----------------------------------------------------------------------------
offline:
  # 数据集
  train_split: "train-clean-360"
  test_split: "test-clean"

  # Step 1: 特征提取
  feature_extraction:
    max_utterances: 5000       # 提取话语数
    batch_size: 8
    num_workers: 4

  # Step 2: Eta 投影训练
  eta_training:
    max_frames: null           # null = 使用全部数据
    learning_rate: 0.001
    num_epochs: 10

  # Step 3: Phone Predictor 训练
  phone_training:
    max_utterances: 5000
    batch_size: 32
    learning_rate: 0.001
    num_epochs: 20

  # Step 4: Style Extractor 训练
  style_training:
    max_frames: null           # null = 使用全部数据
    max_segments: null         # null = 使用全部段

  # Step 5: 预计算话语风格
  style_precompute:
    batch_size: 100

# -----------------------------------------------------------------------------
# Step 6: 风格引导检索配置
# -----------------------------------------------------------------------------
retrieval:
  # 系统模式
  system: "B"                  # A=baseline, B=proposed, C=transfer

  # 检索约束
  use_phone_constraint: true   # Phone-constrained kNN
  use_gender_constraint: true  # 同性别检索
  use_speaker_constraint: true # 不同说话人

  # kNN 参数
  top_k: 1                     # Top-k 检索
  similarity_metric: "cosine"  # cosine / l2

  # 风格权重
  style_weight: 1.0            # 风格相似度权重

# -----------------------------------------------------------------------------
# 计算资源配置
# -----------------------------------------------------------------------------
device: "cuda"
gpu_ids: [0]
num_workers: 4
pin_memory: true

# -----------------------------------------------------------------------------
# 日志配置
# -----------------------------------------------------------------------------
logging:
  level: "INFO"
  save_to_file: true
  log_interval: 100
